name: Docker Build and Publish

on:
  push:
    # Trigger the workflow on version tags
    tags:
      - 'v*.*.*'
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Extract metadata (tags, labels) for Docker
      # This handles syncing the GitHub tag to the Docker tag automatically
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: sizuwanoadi/sizu-portfolio
          tags: |
            # Output the semantic version (e.g. v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            # Output major.minor version tags (e.g. v1.0.0 -> 1.0)
            type=semver,pattern={{major}}.{{minor}}
            # Always push the latest tag when publishing a release
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # You need to set these secrets in your GitHub repository settings
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
